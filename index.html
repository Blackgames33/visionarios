<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIONÁRIOS — Conceptual Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --fg:#eaeaea;
  --accent:#8be9fd;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  color:white;
  font-family:'Roboto',sans-serif;
  overflow-x:hidden;
}

/* BACKGROUND FIXO CENTRALIZADO */
.bg{
  position:fixed;
  top:0;
  left:50%;
  width:120%;
  height:120%;
  transform:translateX(-50%);
  background:url('assets/fundo3.png') center/cover no-repeat;
  opacity:0.25;
  z-index:-1;
  will-change:transform;
  transition:filter 0.4s ease;
}

/* NAV */
header{
  position:fixed;
  width:100%;
  backdrop-filter:blur(18px);
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid var(--border);
  z-index:100;
}

nav{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:90px;
  padding:0 5%;
}

.logo{
  font-family:'Montserrat';
  letter-spacing:0.3em;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* CORE */
.core{
  width:170px;
  height:170px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(139,233,253,0.25), transparent 70%);
  box-shadow:
    0 0 80px rgba(139,233,253,0.2),
    inset 0 0 40px rgba(139,233,253,0.1);
  position:absolute;
  transition:filter 0.3s ease;
}

/* PULSE */
.core::after,
.core::before{
  content:"";
  position:absolute;
  inset:-30px;
  border-radius:50%;
  border:1px solid rgba(139,233,253,0.2);
  animation:pulse 4s infinite;
}
.core::before{ animation-delay:1s; }

@keyframes pulse{
  0%{transform:scale(0.7);opacity:0.8;}
  100%{transform:scale(1.5);opacity:0;}
}

/* ORBIT COM VELOCIDADE DINÂMICA */
.orbit{
  position:absolute;
  width:520px;
  height:520px;
  border-radius:50%;
  border:1px dashed rgba(255,255,255,0.08);
  --speed:40s;
  animation:rotate var(--speed) linear infinite;
  transition:filter 0.3s ease;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* NODE */
.node{
  position:absolute;
  width:80px;
  height:80px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%,
      rgba(255,255,255,0.35),
      rgba(139,233,253,0.12) 40%,
      rgba(0,0,0,0.65) 100%);
  box-shadow:
    inset -12px -12px 25px rgba(0,0,0,0.7),
    inset 6px 6px 12px rgba(255,255,255,0.08),
    0 0 25px rgba(139,233,253,0.15);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(10px) saturate(120%);
  transition:0.4s;
}

.node:hover{
  transform:scale(1.25);
  box-shadow:0 0 30px rgba(139,233,253,0.4);
}

.node-content{
  width:100%;
  height:100%;
  background-size:60%;
  background-position:center;
  background-repeat:no-repeat;
}

/* POSIÇÕES */
.node:nth-child(1){ top:-40px; left:50%; transform:translateX(-50%);}
.node:nth-child(2){ bottom:-40px; left:50%; transform:translateX(-50%);}
.node:nth-child(3){ left:-40px; top:50%; transform:translateY(-50%);}
.node:nth-child(4){ right:-40px; top:50%; transform:translateY(-50%);}

/* HUD */
.node-display{
  position:absolute;
  bottom:12%;
  width:100%;
  text-align:center;
  font-size:0.85rem;
  letter-spacing:0.25em;
  opacity:0;
  transition:0.3s ease;
}

/* HERO TEXT */
.hero-text{
  position:absolute;
  bottom:8%;
  text-align:center;
  max-width:800px;
}

/* SECTION */
section{ padding:140px 0; }

.shell{
  max-width:1200px;
  margin:auto;
  padding:0 5%;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:40px;
}

.card{
  padding:40px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.02);
  transition:0.4s;
}

footer{
  padding:100px 0;
  border-top:1px solid var(--border);
  text-align:center;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
<nav>
<div class="logo">VISIONÁRIOS</div>
</nav>
</header>

<section class="hero">

<div class="core"></div>

<div class="orbit">
<a href="#" class="node" data-name="Cognitive System">
<div class="node-content" style="background-image:url('assets/brain.png')"></div>
</a>

<a href="#" class="node" data-name="Chrono Dynamics">
<div class="node-content" style="background-image:url('assets/time.png')"></div>
</a>

<a href="#" class="node" data-name="Structural Cosmology">
<div class="node-content" style="background-image:url('assets/cosmos.png')"></div>
</a>

<a href="#" class="node" data-name="Computational Layer">
<div class="node-content" style="background-image:url('assets/computation.png')"></div>
</a>
</div>

<div class="node-display" id="nodeDisplay"></div>

</section>

<footer>
<p>© 2026 Visionários</p>
</footer>

<script>
const orbit = document.querySelector(".orbit");
const nodes = document.querySelectorAll(".node");
const display = document.getElementById("nodeDisplay");
const bg = document.querySelector(".bg");
const core = document.querySelector(".core");

let speed = 40;
let targetSpeed = 40;

function animateOrbit(){
  speed += (targetSpeed - speed) * 0.08;
  orbit.style.setProperty("--speed", speed + "s");
  requestAnimationFrame(animateOrbit);
}
animateOrbit();

nodes.forEach(node => {

  node.addEventListener("mouseenter", () => {
    targetSpeed = 200;

    orbit.style.filter = "brightness(1.2)";
    core.style.filter = "brightness(1.3)";
    bg.style.filter = "brightness(0.8)";

    display.innerText = node.dataset.name;
    display.style.opacity = 1;
  });

  node.addEventListener("mouseleave", () => {
    targetSpeed = 40;

    orbit.style.filter = "none";
    core.style.filter = "none";
    bg.style.filter = "none";

    display.style.opacity = 0;
  });

  node.addEventListener("click", () => {
    targetSpeed = 200;

    display.innerText = node.dataset.name;
    display.style.opacity = 1;
  });

});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".node")) {
    targetSpeed = 40;
    display.style.opacity = 0;

    orbit.style.filter = "none";
    core.style.filter = "none";
    bg.style.filter = "none";
  }
});

window.addEventListener("scroll", () => {
  const offsetY = window.scrollY * 0.2;
  bg.style.transform = `translate(-50%, ${offsetY}px)`;
});
</script>

</body>
</html>

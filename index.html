<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VISIONÁRIOS — Conceptual Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --fg:#eaeaea;
  --accent:#8be9fd;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* ================= FUNDO ESTÁVEL ================= */
.bg{
  position:fixed;
  inset:0;
  background:url('assets/library.jpg') center center no-repeat;
  background-size:cover;
  z-index:-2;
}

.bg-overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.85));
  z-index:-1;
}

/* ================= NAV ================= */
header{
  position:relative;
  width:100%;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid var(--border);
  z-index:100;
}

nav{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  height:60px;
  padding:0 5%;
}

.logo{
  font-size:0.9rem;
  letter-spacing:0.15em;
  opacity:0.3;
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:fixed;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-center{
  z-index:10;
}

.hero h1{
  font-family:'inter', sans-serif;
  font-size:clamp(2.5rem,6vw,4rem);
  letter-spacing:0.3em;
  font-weight:300;
  opacity:0.9;
  color:#f5f5f5;
  text-shadow:
    0 0 20px rgba(255,255,255,0.15),
    0 0 40px rgba(255,255,255,0.05);
}

.subtitle{
  margin-top:20px;
  opacity:0.7;
  font-size:0.9rem;
  letter-spacing:0.15em;
}

/* ================= SECTION ================= */
section{
  padding:140px 0;
}

.shell{
  max-width:1200px;
  margin:auto;
  padding:0 5%;
}

.section-title{
  text-align:center;
  margin-bottom:80px;
  letter-spacing:0.18em;
  font-weight:300;
}



/* ================= FOOTER ================= */
footer{
  padding:100px 0;
  border-top:1px solid var(--border);
  text-align:center;
  opacity:0.6;
}

/* ================= MOBILE ================= */
@media (max-width:768px){

  .hero h1{
    font-size:1.8rem;
    letter-spacing:0.2em;
  }

  .subtitle{
    font-size:0.75rem;
    padding:0 20px;
  }

}
  .subnote{
  margin-top:10px;
  font-size:0.7rem;
  letter-spacing:0.25em;
  opacity:0.25;

  text-transform:uppercase;
}
  .hotspot{
  position:absolute;
  display:block;
  cursor:pointer;
}
.timeline-flow{
  position:fixed;
  bottom:18%;
  left:0;
  width:100vw;
  height:20px;
  pointer-events:none;
  z-index:5;
}

.line{
  position:absolute;
  top:50%;
  height:2px;
  width:0vw;
  left:-10vw;
  background:rgba(255,255,255,0.3);
  transform:translatey(-50%);
  animation:lineGrow 4.7s linear forwards;

}

.year{
  position:absolute;
  top:-12px;
  font-size:0.75rem;
  letter-spacing:0.2em;
  opacity:0.6;
  white-space:nowrap;
}

@keyframes lineGrow{
  0%{ width:0vw; }
  100%{ width:130vw; }

}

  }
.hero{
  transition:transform 1.2s ease;
}

.hero.zoom{
  transform:scale(1.05);
}
  body{
  transition:transform 1.8s ease;
}

.year-pop{
  position:absolute;
  bottom:6px;
  transform:translateX(-50%);
  font-size:0.75rem;
  letter-spacing:0.2em;
  opacity:0;

  animation:popUp 2s ease forwards;
}

@keyframes popUp{
  0%{
    opacity:0;
    transform:translate(-50%, 10px);
  }
  30%{
    opacity:0.5;
  }
  100%{
    opacity:0;
    transform:translate(-50%, -18px);
  }
}

.hero-center{
  opacity:0;
  transform:translateY(20px);
  transition:all 1.2s ease;
}

.hero-center.show{
  opacity:1;
  transform:translateY(0);
}

.hero-center h1{
  letter-spacing:0.4em;
  transition:all 1.2s ease;
}

.hero-center.show h1{
  letter-spacing:0.25em;
}
</style>
</head>

<body>

<!-- FUNDO -->
<div class="bg"></div>
<div class="bg-overlay"></div>

<!-- NAV -->
<header>
  <nav>
    <div class="logo">VISIONÁRIOS 2145</div>
     
  </nav>
</header>

<!-- HERO -->

<section class="hero">
  <div class="hero-center">
    <h1>VISIONÁRIOS</h1>
     <div class="timeline-flow">
  <div class="line"></div>
  <div class="year" id="year"></div>
</div>
 
    <p class="subtitle">
      Seeding the limits of reality<br>
      2025 — 2145
      <p class="subnote">
       sensing reality boundaries 
        
        
    </p>
  </div>
</section>


<!-- FOOTER -->
<footer>
  <p>© 2026 Visionários</p>
</footer>
<script>
const years = ["2025","2030","2050","2080","2100","2145"];
const container = document.querySelector(".timeline-flow");

const duration = 4000;
const stepTime = duration / years.length;

years.forEach((year, i) => {

  setTimeout(() => {

    const el = document.createElement("div");
    el.className = "year-pop";
    el.textContent = year;

    // posição ao longo da linha
    const progress = (i + 1) / years.length;
   let pos = progress * window.innerWidth;

// se for o último (2145), puxa um pouco pra dentro
if(i === years.length - 1){
  pos = window.innerWidth - 80; // ajuste fino

setTimeout(() => {
  document.querySelector(".hero-center").classList.add("show");
}, 1200);
}

el.style.left = pos + "px";

    container.appendChild(el);

    // remove depois da animação
    setTimeout(() => el.remove(), 2000);

  }, i * stepTime + 280 );

});
</script>
</body>
</html>

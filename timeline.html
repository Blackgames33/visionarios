<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VISIONÁRIOS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* ================= FUNDO ================= */

.bg{
  position:fixed;
  inset:0;

  background:url('assets/time.jpg') center center no-repeat;
  background-size:cover;

  opacity:0; /* 👈 ISSO É O SEGREDO */
  transition:opacity 2s ease;

  z-index:-3;
}
  .bg-color{
    position:fixed;
    inset:0;
    z-index:-2;
  }
  .bg.show{
  opacity:1;
}

.bg-tone{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
  transition:background 1.2s ease;
}

/* ================= HERO ================= */

.hero{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
   z-index:10;
}

.hero-center{
  opacity:0;
  transform:translateY(10px);
  transition:1.5s ease;
}

.hero-center.show{
  opacity:1;
  transform:translateY(0);
}

.hero h1{
  font-family:'Montserrat';
  font-size:clamp(2.5rem,6vw,4rem);
  letter-spacing:0.35em;
  font-weight:300;
  text-shadow:0 0 20px rgba(255,255,255,0.15);
}

.subtitle{
  margin-top:20px;
  font-size:0.85rem;
  letter-spacing:0.2em;
  opacity:0.7;
}

/* ================= TIMELINE ================= */

.timeline{
  position:absolute;
 
  top:55%;
  left:0;
  width:100%;
  height:2px;
   z-index:10;
}

.timeline-bar{
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.08);
}

.timeline-progress{
  height:100%;
  width:0%;
  background:rgba(255,255,255,0.25);
}

.year{
  position:absolute;
  top:-25px;
  font-size:0.75rem;
  letter-spacing:0.2em;
  opacity:0.7;
  transform:translateX(-50%);
}

/* ================= CURSOR ================= */

body{cursor:none;}

.cursor{
  position:fixed;
  width:20px;
  height:20px;
  z-index:999;
  pointer-events:none;
  font-size:18px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){
  body{cursor:auto;}

  .timeline{
    top:65%;
  }
}
.cinema-bg{
  position:fixed;
  inset:0;

  background:url('assets/time.jpg') center center no-repeat;
  background-size:cover;

  opacity:0;
  transition:opacity 2.5s ease;

  z-index:-2; /* bem atrás de tudo */
}
  .scene{
  position:absolute;
  inset:0;

  background-size:cover;
  background-position:center;

  opacity:0;
  transition:opacity 0.8s ease;

  z-index:0;
}

/* IMAGENS */
.scene-1 { background-image: url('assets/wallstreet.jpg'); }
.scene-2 { background-image: url('assets/onu.jpg'); }
.scene-3 { background-image: url('assets/library6.jpg'); }
.scene-4 { background-image: url('assets/plane.jpg'); }
.scene-5 { background-image: url('assets/house.jpg'); }
.scene-6 { background-image: url('assets/futuro1.jpg'); }
.scene-7 { background-image: url('assets/conceito2.jpg'); }
.scene-8 { background-image: url('assets/conceito2.jpg'); }
  
@media (max-width:768px){

  .hero h1{
    font-size: clamp(1.2rem, 6vw, 1.8rem);
    letter-spacing: 0.12em; /* ↓ reduzido */
    line-height: 1.2;

    max-width: 90vw;
    margin: 0 auto;

    text-align: center;
    word-break: break-word;
  }

  .subtitle{
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0 10px;
  }

}
  body{
    overflow:-x:hidden;
  }
   @media (max-width:768px){

.scene{
display:flex;
align-items:center;
justify-content:center;
}

}
@media (max-width:768){
.scene{
background-size: 160%;
  }

} 

</style>
</head>

<body>

<!-- FUNDO -->
    <div class="cinema-bg"></div>

<div class="bg-tone"></div>
<!-- <div class="bg-dynamic"></div> -->
<!-- <div class="bg-image"></div> -->
<!-- <div class="bg-color"></div> -->
  
  <div class="scene scene-1"></div>
<div class="scene scene-2"></div>
<div class="scene scene-3"></div>
<div class="scene scene-4"></div>
<div class="scene scene-5"></div>
<div class="scene scene-6"></div>
<div class="scene scene-7"></div>
<div class="scene scene-8"></div>
<!-- HERO -->
<section class="hero">
  <div class="hero-center" id="hero">
 <h1>VISIONÁRIOS</h1>
    <p class="subtitle">2025 — 2145</p>
  </div>
</section>

<!-- TIMELINE -->
<div class="timeline">
  <div class="timeline-bar">
    <div class="timeline-progress" id="progress"></div>
  </div>
  <div class="year" id="year"></div>
</div>

<!-- CURSOR -->
<div class="cursor" id="cursor">→</div>

<script>
/* ================= ELEMENTOS ================= */

const progress = document.getElementById("progress");
const year = document.getElementById("year");
const tone = document.querySelector(".bg-tone");
const hero = document.getElementById("hero");
const cursor = document.getElementById("cursor");

/* ================= HERO ================= */

setTimeout(() => {
  hero.classList.add("show");
}, 1800);

/* ================= CENAS ================= */

const scenes = [
  document.querySelector(".scene-1"),
  document.querySelector(".scene-2"),
  document.querySelector(".scene-3"),
  document.querySelector(".scene-4"),
  document.querySelector(".scene-5"),
  document.querySelector(".scene-6"),
  document.querySelector(".scene-7"),
  document.querySelector(".scene-8")
];

/* ================= 🎯 TIMELINE CONTROL ================= */

const timelineConfig = [
  { start: 0.00, end: 0.10, scene: 0 }, // Wall Street
  { start: 0.10, end: 0.20, scene: 1 }, // ONU
  { start: 0.20, end: 0.30, scene: 2 }, // Biblioteca
  { start: 0.30, end: 0.40, scene: 3 }, // Avião
  { start: 0.40, end: 0.50, scene: 4 }, // Cozinha
  { start: 0.50, end: 0.60, scene: 5 }, // Futuro 1
  { start: 0.60, end: 0.70, scene: 6 }, // Futuro 2
  { start: 0.70, end: 0.80, scene: 7 }  // Final
];

function getSceneIndex(x){
  for(let i = 0; i < timelineConfig.length; i++){
    const zone = timelineConfig[i];
    if(x >= zone.start && x < zone.end){
      return zone.scene;
    }
  }
  return 0;
}

/* ================= FUNÇÃO CENTRAL ================= */

function updateExperience(x, clientX, clientY){

  /* ===== TIMELINE ===== */
  if(progress) progress.style.width = (x * 100) + "%";

  if(year){
    const yearValue = Math.floor(2025 + x * (2145 - 2025));
    year.innerText = yearValue;
    year.style.left = (x * 100) + "%";
  }

  /* ===== FUNDO DINÂMICO ===== */
  if(tone){
    if (x < 0.25) {
      tone.style.background = "linear-gradient(to right, rgba(255,180,120,0.25), transparent)";
    } 
    else if (x < 0.5) {
      tone.style.background = "linear-gradient(to right, rgba(180,220,255,0.15), transparent)";
    } 
    else if (x < 0.75) {
      tone.style.background = "linear-gradient(to right, rgba(120,160,255,0.25), transparent)";
    } 
    else {
      tone.style.background = "linear-gradient(to right, rgba(200,200,255,0.35), transparent)";
    }
  }

  /* ===== CURSOR ===== */
  if(cursor){
    cursor.style.left = clientX + "px";
    cursor.style.top = clientY + "px";
  }

  /* ===== CENAS (AGORA CONTROLADAS) ===== */
  const index = getSceneIndex(x);

  scenes.forEach(s => {
    if (s) s.style.opacity = "0";
  });

  if (scenes[index]) {
    scenes[index].style.opacity = "1";
  }

  /* ===== FINAL (TRANSIÇÃO) ===== */
  if (x > 0.97 && !window._transitioning) {
    window._transitioning = true;

    document.body.style.transition = "opacity 0.8s ease";
    document.body.style.opacity = "0";

    setTimeout(() => {
      window.location.href = "timeline.html";
    }, 800);
  }
}

/* ================= DESKTOP ================= */

window.addEventListener("mousemove", (e) => {
  const x = e.clientX / window.innerWidth;
  updateExperience(x, e.clientX, e.clientY);
});

/* ================= MOBILE ================= */

window.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  const x = touch.clientX / window.innerWidth;
  updateExperience(x, touch.clientX, touch.clientY);
});

/* ================= CINEMA EFFECT ================= */

let cinemaRevealed = false;

function revealCinema(){
  if(cinemaRevealed) return;

  cinemaRevealed = true;

  const cinema = document.querySelector(".cinema-bg");
  if(cinema){
    cinema.style.opacity = "1";
  }
}

window.addEventListener("mousemove", revealCinema);
window.addEventListener("touchstart", revealCinema);

/* ================= MOBILE AJUSTE ================= */

if (window.innerWidth < 768) {
  const timeline = document.querySelector(".timeline");
  if(timeline) timeline.style.display = "none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VISIONÁRIOS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* ================= FUNDO ================= */

.bg{
  position:fixed;
  inset:0;

  background:url('assets/timeline/t0_system_flow.jpg') center center no-repeat;
  background-size:cover;

  z-index:-2;
}
  .bg::after{
  content:'';
  position:absolute;
  inset:0;

  background:
    linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.65));

  backdrop-filter:contrast(0.95) saturate(0.9);

  z-index:1;
}

.bg-tone{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
  transition:background 1.2s ease;
}

/* ================= HERO ================= */

.hero{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-center{
  opacity:0;
  transform:translateY(10px);
  transition:1.5s ease;
}

.hero-center.show{
  opacity:1;
  transform:translateY(0);
}

.hero h1{
  font-family:'Montserrat';
  font-size:clamp(2.5rem,6vw,4rem);
  letter-spacing:0.35em;
  font-weight:300;
  text-shadow:0 0 20px rgba(255,255,255,0.15);
}

.subtitle{
  margin-top:20px;
  font-size:0.85rem;
  letter-spacing:0.2em;
  opacity:0.7;
}

/* ================= TIMELINE ================= */

.timeline{
  position:absolute;
  top:55%;
  left:0;
  width:100%;
  height:2px;
}

.timeline-bar{
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.08);
}

.timeline-progress{
  height:100%;
  width:0%;
  background:rgba(255,255,255,0.25);
}

.year{
  position:absolute;
  top:-25px;
  font-size:0.75rem;
  letter-spacing:0.2em;
  opacity:0.7;
  transform:translateX(-50%);
}

/* ================= CURSOR ================= */

body{cursor:none;}

.cursor{
  position:fixed;
  width:20px;
  height:20px;
  z-index:999;
  pointer-events:none;
  font-size:18px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){
  body{cursor:auto;}

  .timeline{
    top:65%;
  }
}
body{
  background:#000;
  overflow:hidden; /* trava scroll no intro */
}
</style>
</head>

<body>

<!-- FUNDO -->
<div class="bg-dynamic"></div>
<div class="bg-tone"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-center" id="hero">
    <h1>VISIONÁRIOS</h1>
    <p class="subtitle">2025 — 2145</p>
  </div>
</section>

<!-- TIMELINE -->
<div class="timeline">
  <div class="timeline-bar">
    <div class="timeline-progress" id="progress"></div>
  </div>
  <div class="year" id="year"></div>
</div>

<!-- CURSOR -->
<div class="cursor" id="cursor">→</div>

<script>

/* ELEMENTOS */
const progress = document.getElementById("progress");
const year = document.getElementById("year");
const tone = document.querySelector(".bg-tone");
const hero = document.getElementById("hero");
const cursor = document.getElementById("cursor");

/* ================= HERO APARECE DEPOIS ================= */
setTimeout(()=>{
  hero.classList.add("show");
}, 1800);

/* ================= INTERAÇÃO ================= */
window.addEventListener("mousemove", (e)=>{

  const percent = e.clientX / window.innerWidth;

  /* LINHA */
  progress.style.width = (percent * 100) + "%";

  /* ANO */
  const yearValue = Math.floor(2025 + percent * (2145 - 2025));
  year.innerText = yearValue;
  year.style.left = (percent * 100) + "%";

  /* FUNDO DINÂMICO */
  if(percent < 0.25){
    tone.style.background = "linear-gradient(to right, rgba(255,180,120,0.25), transparent)";
  }
  else if(percent < 0.5){
    tone.style.background = "linear-gradient(to right, rgba(180,220,255,0.15), transparent)";
  }
  else if(percent < 0.75){
    tone.style.background = "linear-gradient(to right, rgba(120,160,255,0.25), transparent)";
  }
  else{
    tone.style.background = "linear-gradient(to right, rgba(200,200,255,0.35), transparent)";
  }

  /* CURSOR */
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";

});

/* ================= MOBILE (fallback simples) ================= */
if(window.innerWidth < 768){
  document.querySelector(".timeline").style.display = "none";
}

</script>

</body>
</html>

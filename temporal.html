
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Architecture</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* FUNDO */

.bg{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, #050505, #000);
   inset:0;
  background:url('assets/fundo2.png') center/cover no-repeat;
  opacity:0.25;
  z-index:-1;
  z-index:-1;
}
/* NAV */
header{
  position:fixed;
  width:0%;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid var(--border);
  z-index:100;
}

  nav{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content: center extreme;
  align-items:right;
  height:50px;
  padding:0 5%;
}
.logo{
  font-family:'Inter';
  letter-spacing:0.3em;
}  
/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
/* CONTAINER */

.system{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ENGRENAGEM BASE */

.gear{
  position:absolute;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.08);

  background:
    radial-gradient(circle,
      rgba(255,255,255,0.05),
      transparent 70%);
}

/* CENTRO */

.gear-center{
  width:180px;
  height:180px;

  box-shadow:
    0 0 60px rgba(139,233,253,0.15),
    inset 0 0 30px rgba(255,255,255,0.05);

  animation:rotateClock 12s linear infinite;
}

/* ENGRENAGENS AO REDOR */

.gear-small{
  width:90px;
  height:90px;
}

/* POSIÇÕES */

.gear1{ top:30%; left:50%; transform:translate(-50%, -50%); animation:rotateCounter 10s linear infinite;}
.gear2{ bottom:30%; left:50%; transform:translate(-50%, 50%); animation:rotateClock 9s linear infinite;}
.gear3{ left:30%; top:50%; transform:translate(-50%, -50%); animation:rotateCounter 11s linear infinite;}
.gear4{ right:30%; top:50%; transform:translate(50%, -50%); animation:rotateClock 8s linear infinite;}

/* ROTAÇÕES */

@keyframes rotateClock{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

@keyframes rotateCounter{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(-360deg); }
}

/* DENTES (efeito visual) */

.gear::before{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;

  background:
    repeating-conic-gradient(
      rgba(255,255,255,0.15) 0deg 6deg,
      transparent 6deg 12deg
    );
}

/* TEXTO */

.label{
  position:absolute;
  bottom:8%;
  text-align:center;
  width:100%;
}

.label h1{
  font-family:'Inter';
  letter-spacing:0.2em;
  font-weight:300;
}

</style>
</head>

<body>

<div class="bg"></div>

<section class="system">

  <!-- CENTRAL -->
  <div class="gear gear-center"></div>

  <!-- SATÉLITES -->
  <div class="gear gear-small gear1"></div>
  <div class="gear gear-small gear2"></div>
  <div class="gear gear-small gear3"></div>
  <div class="gear gear-small gear4"></div>

</section>

<div class="label">
  <h1>System Dynamics</h1>
</div>

</body>
</html>

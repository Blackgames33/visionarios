<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARCHIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Inter', sans-serif;

  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;

  overflow:hidden;
}

/* conteúdo */
.archive{
  text-align:center;
}

.archive h1{
  font-family:'Montserrat';
  letter-spacing:0.3em;
  font-weight:300;
  margin-bottom:40px;
}

/* links */
.archive a{
  display:block;
  margin:15px 0;
  color:#fff;
  text-decoration:none;
  opacity:0.7;
  transition:0.3s;
}

.archive a:hover{
  opacity:1;
}

/* voltar (lado esquerdo) */
.back-zone{
  position:fixed;
  left:0;
  top:0;
  width:80px;
  height:100vh;
  cursor:pointer;
}
.archive-title{
  opacity:0;
  transform:translateY(10px);
  transition:2s ease;
}

.archive-title.show{
  opacity:1;
  transform:translateY(0);
}

.back-hint{
  position:fixed;
  left:30px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  opacity:0.2;
  cursor:pointer;
  transition:0.3s;
}

.back-hint:hover{
  opacity:0.7;
}
  .archive{
  text-align:center;
}

/* flecha rápida */
.arrow-fast{
  position:fixed;
  left:-100px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  opacity:0.6;
  transition:1s ease;
}

.arrow-fast.show{
  left:110%;
  opacity:0;
}

/* título */
.archive-title{
  opacity:0;
  transform:translateY(20px);
  transition:1.5s ease;
}

/* conteúdo */
.archive-content{
  opacity:0;
  transform:translateY(20px);
  transition:1.5s ease;
}

/* ativação */
.archive.show .archive-title,
.archive.show .archive-content{
  opacity:1;
  transform:translateY(0);
}

/* links */
.archive a{
  display:block;
  margin:15px 0;
  color:#fff;
  text-decoration:none;
  opacity:0.7;
  transition:0.3s;
}

.archive a:hover{
  opacity:1;
}

/* voltar por zona */
.back-zone{
  position:fixed;
  left:0;
  top:0;
  width:80px;
  height:100vh;
  z-index:50;
}
</style>
</head>

<body>

<div class="archive">
  <div class="arrow-fast">→</div>

  <h1 class="archive-title">SEMANTIC INFRASTRUCTURE</h1>

  <div class="archive-content">
  <a href="https://doi.org/10.5281/zenodo.19247329" target="_blank">
  Conceptual Foundations
      Layer I — Conceptual Foundations
    </a>

   <a href="https://doi.org/10.5281/zenodo.19704495" target="_blank">
      Layer II — Post-Symbolic Communication
    </a>
  </div>
</div>

<div class="back-zone" id="backZone"></div>

<script>

/* voltar automaticamente */
document.getElementById("back").addEventListener("mousemove", () => {
  window.location.href = "timeline.html";
});
setTimeout(() => {
  document.querySelector(".archive-title").classList.add("show");
}, 800);

document.getElementById("back").addEventListener("click", () => {
  window.location.href = "timeline.html";
});
  const archive = document.querySelector(".archive");
const arrow = document.querySelector(".arrow-fast");

/* entrada cinematográfica */
setTimeout(() => {
  arrow.classList.add("show");
}, 200);

setTimeout(() => {
  archive.classList.add("show");
}, 800);

/* clique */
document.getElementById("backZone").addEventListener("click", () => {
  window.location.href = "timeline.html";
});

/* mover mouse */
window.addEventListener("mousemove", (e) => {
  const x = e.clientX / window.innerWidth;

  if(x < 0.03){
    window.location.href = "timeline.html";
  }
});

/* mobile */
window.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  const x = touch.clientX / window.innerWidth;

  if(x < 0.05){
    window.location.href = "timeline.html";
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEMANTIC INFRASTRUCTURE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:'Inter', sans-serif;
  color:#fff;

  background:#000;
}

/* FUNDO (opcional, pode trocar imagem) */
.bg{
  position:fixed;
  inset:0;
  background:url('') center/cover no-repeat;
  z-index:-2;
}

.bg-overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
  z-index:-1;
}

/* CONTAINER */
.archive{
  text-align:center;
  position:relative;
  z-index:10;
}

/* FLECHA */
.arrow-fast{
  position:fixed;
  left:-100px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  opacity:0.6;
  transition:3s cubic-bezier(0.22, 1, 0.36, 1); 
  z-index:5;
}

.arrow-fast.show{
  left:110%;
  opacity:0;
}

/* TÍTULO */
.archive-title{
  font-family:'Montserrat';
  letter-spacing:0.3em;
  font-weight:300;

  opacity:0;
  transform:translateY(20px);
  transition:1.5s ease;
}

/* CONTEÚDO */
.archive-content{
  margin-top:40px;

  opacity:0;
  transform:translateY(20px);
  transition:1.5s ease;
}

/* ATIVAÇÃO */
.archive.show .archive-title,
.archive.show .archive-content{
  opacity:1;
  transform:translateY(0);
}

/* LINKS */
  .archive a{
  display:block;
  margin:15px 0;
  color:#fff;
  text-decoration:none;
  opacity:0.7;
  transition:0.3s;
  letter-spacing:0.15em;
}

.archive a:hover{
  opacity:1;
}
.archive a{
  position:relative;
}

.archive a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0;
  height:0.1px;
  background:rgba(255,255,255,0.1);
  transition:0.2s ease;
}

.archive a:hover::after{
  width:70%;
}


/* ZONA DE VOLTA */
.back-zone{
  position:fixed;
  left:0;
  top:0;
  width:80px;
  height:100vh;
  z-index:20;
  cursor:pointer;
}

/* MOBILE */
@media (max-width:768px){
  body{
    touch-action:none;
  }
}
@media (max-width:768px){

  .archive-title{
    font-size:1.4rem;
    letter-spacing:0.15em;
    padding:0 20px;
  }

  .archive-content{
    margin-top:25px;
  }

  .archive a{
    font-size:0.8rem;
    letter-spacing:0.1em;
    padding:0 20px;
  }

}
</style>
</head>

<body>

<!-- FUNDO -->
<div class="bg"></div>
<div class="bg-overlay"></div>

<!-- CONTEÚDO -->
<div class="archive">

  <div class="arrow-fast">→</div>

  <h1 class="archive-title">SEMANTIC INFRASTRUCTURE</h1>

  <div class="archive-content">

    <a href="https://doi.org/10.5281/zenodo.19247329" target="_blank">
      Entry - Conceptual Foundations
    </a>

    <a href="https://doi.org/10.5281/zenodo.19704495" target="_blank">
     Entry - Post-Symbolic Systems
    </a>

  </div>

</div>

<!-- ZONA DE VOLTA -->
<div class="back-zone" id="backZone"></div>

<script>

/* ELEMENTOS */
const archive = document.querySelector(".archive");
const arrow = document.querySelector(".arrow-fast");
const backZone = document.getElementById("backZone");

/* ENTRADA CINEMATOGRÁFICA */
setTimeout(() => {
  arrow.classList.add("show");
}, 200);

setTimeout(() => {
  archive.classList.add("show");
}, 800);

/* VOLTAR (CLIQUE) */
backZone.addEventListener("click", () => {
  window.location.href = "timeline.html";
});

/* VOLTAR (MOUSE ESQUERDA) */
window.addEventListener("mousemove", (e) => {
  const x = e.clientX / window.innerWidth;

  if(x < 0.01){
    window.location.href = "timeline.html";
  }
});

/* MOBILE */
window.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  const x = touch.clientX / window.innerWidth;

  if(x < 0.05){
    window.location.href = "timeline.html";
  }
});

</script>

</body>
</html>
